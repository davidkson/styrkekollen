<!-- Collar left -->
<rect x="209" y="148" width="10" height="30" rx="3" fill="#b8943e" style="fill:rgb(184, 148, 62);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Right weight plates -->
<!-- Outer plate right -->
