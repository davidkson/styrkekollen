<!-- Checkmark badge (circle) -->
<circle cx="340" cy="163" r="36" fill="#1a1a2e" stroke="#c8a96e" stroke-width="3" style="fill:rgb(26, 26, 46);stroke:rgb(200, 169, 110);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="340" cy="163" r="30" fill="#1a1a2e" style="fill:rgb(26, 26, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Checkmark path -->
<polyline points="323,163 335,175 358,150" fill="none" stroke="#4ade80" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(74, 222, 128);color:rgb(255, 255, 255);stroke-width:4.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Bolt / lightning accent top right of badge -->
<polygon points="348,132 342,144 347,144 340,157 349,143 344,143" fill="#f59e0b" opacity="0.85" style="fill:rgb(245, 158, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Brand name -->
<text x="340" y="234" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#f0e6cc" letter-spacing="1" style="fill:rgb(240, 230, 204);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:30px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Styrkekollen</text>

<!-- Tagline -->
<text x="340" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c8a96e" letter-spacing="4" style="fill:rgb(200, 169, 110);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">FÖLJ DIN STYRKA</text>

<!-- Decorative line under text -->
<line x1="230" y1="271" x2="450" y2="271" stroke="#c8a96e" stroke-width="0.8" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(200, 169, 110);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
